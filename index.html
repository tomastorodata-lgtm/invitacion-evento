<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Invitación</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden; /* sin scroll */
    }

    body {
      background: #000;
      font-family: Arial, sans-serif;
    }

    /* Full screen (mobile-first) */
    .screen {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100dvh; /* mejor que 100vh en mobile */
      overflow: hidden;
    }

    /* Imagen: llena pantalla */
    .img {
      width: 100vw;
      height: 100dvh;
      object-fit: cover; /* llena pantalla sin scroll */
      display: block;
    }

    /* Hotspot invisible sobre el “acá”
       AJUSTÁ estos valores hasta que el toque caiga justo sobre "acá" */
    .hotspot {
      position: absolute;
      left: 40%;
      top: 70%;
      width: 20%;
      height: 8%;
      cursor: pointer;

      /* Para debug visual del hotspot (activar temporalmente):
         background: rgba(255, 0, 0, 0.25); */
      background: rgba(255, 255, 255, 0.0);
      -webkit-tap-highlight-color: transparent;
    }

    /* Modal */
    .modal-bg {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.65);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      box-sizing: border-box;
    }

    .modal {
      width: 100%;
      max-width: 420px;
      background: #111;
      color: #fff;
      border-radius: 16px;
      padding: 18px;
      box-sizing: border-box;
      border: 1px solid #2a2a2a;
    }

    h3 {
      margin: 0 0 10px 0;
      font-size: 18px;
    }

    label {
      display: block;
      margin-top: 10px;
      font-size: 14px;
      opacity: 0.9;
    }

    input {
      width: 100%;
      margin-top: 6px;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #333;
      background: #0b0b0b;
      color: #fff;
      box-sizing: border-box;
      font-size: 16px;
      outline: none;
    }

    button {
      width: 100%;
      margin-top: 14px;
      padding: 12px;
      border-radius: 12px;
      border: none;
      font-size: 16px;
      cursor: pointer;
    }

    .btn {
      background: #fff;
      color: #000;
      font-weight: 700;
    }

    .btn2 {
      background: transparent;
      color: #fff;
      border: 1px solid #444;
    }

    .msg {
      margin-top: 10px;
      font-size: 14px;
      opacity: 0.95;
      min-height: 18px;
      word-break: break-word;
    }

    .small {
      font-size: 12px;
      opacity: 0.75;
      margin-top: 6px;
    }
  </style>
</head>

<body>
  <div class="screen">
    <img class="img" src="invitation.jpg" alt="Invitación" />
    <div class="hotspot" id="openForm" aria-label="Confirmar asistencia"></div>
  </div>

  <div class="modal-bg" id="modal">
    <div class="modal">
      <h3>Confirmá tu asistencia</h3>

      <label>Nombre</label>
      <input id="nombre" autocomplete="given-name" />

      <label>Apellido</label>
      <input id="apellido" autocomplete="family-name" />

      <label>¿Tenés alguna restricción alimenticia?</label>
      <input id="restriccion" placeholder="Ej: Ninguna / Celíaco / Vegano..." />

      <button class="btn" id="send">Confirmar</button>
      <button class="btn2" id="close" type="button">Cerrar</button>

      <div class="msg" id="msg"></div>
      <div class="small">Tus datos se guardan para la organización del evento.</div>
    </div>
  </div>

  <script>
    // Tu Web App URL (Apps Script)
    const ENDPOINT = "https://script.google.com/macros/s/AKfycbxg6JRoaTD9_g1tsXPMGu4qZ8wcO8NNw6LK_b7ivtKBd9TspH2L6lrywDdzYvpd5uPJKQ/exec";

    const modal = document.getElementById('modal');
    const msg = document.getElementById('msg');

    const nombreEl = document.getElementById('nombre');
    const apellidoEl = document.getElementById('apellido');
    const restriccionEl = document.getElementById('restriccion');

    document.getElementById('openForm').addEventListener('click', () => {
      msg.textContent = "";
      modal.style.display = 'flex';
      setTimeout(() => nombreEl.focus(), 50);
    });

    document.getElementById('close').addEventListener('click', () => {
      modal.style.display = 'none';
    });

    // Cerrar tocando fuera del modal
    modal.addEventListener('click', (e) => {
      if (e.target === modal) modal.style.display = 'none';
    });

    document.getElementById('send').addEventListener('click', async () => {
      const nombre = nombreEl.value.trim();
      const apellido = apellidoEl.value.trim();
      const restriccion = restriccionEl.value.trim();

      if (!nombre || !apellido) {
        msg.textContent = "Completá Nombre y Apellido 🙏";
        return;
      }

      msg.textContent = "Enviando...";

      try {
        // ✅ Cambio clave: SIN headers para evitar preflight/CORS raros → evita 405 en muchos casos
        const res = await fetch(ENDPOINT, {
          method: 'POST',
          body: JSON.stringify({ nombre, apellido, restriccion })
        });

        const text = await res.text();
        console.log("DEBUG STATUS:", res.status, "DEBUG BODY:", text);

        let data;
        try { data = JSON.parse(text); }
        catch { data = { ok: false, error: text }; }

        if (!data.ok) throw new Error(data.error || "Error desconocido");

        msg.textContent = "¡Listo! Quedaste confirmado ✅";

        nombreEl.value = "";
        apellidoEl.value = "";
        restriccionEl.value = "";

        setTimeout(() => { modal.style.display = 'none'; }, 1200);

      } catch (e) {
        msg.textContent = "No se pudo enviar: " + (e && e.message ? e.message : String(e));
      }
    });
  </script>
</body>
</html>
